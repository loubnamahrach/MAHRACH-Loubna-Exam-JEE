<div class="register-container">
  <div class="register-box">
    <h1>Inscription</h1>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="username">Nom d'utilisateur:</label>
        <input 
          type="text" 
          id="username" 
          formControlName="username"
          class="form-control"
          [class.is-invalid]="submitted && f['username'].errors"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['username'].errors">
          Le nom d'utilisateur est requis
        </div>
      </div>

      <div class="form-group">
        <label for="motdepasse">Mot de passe:</label>
        <input 
          type="password" 
          id="motdepasse" 
          formControlName="motdepasse"
          class="form-control"
          [class.is-invalid]="submitted && f['motdepasse'].errors"
        />
        <div class="invalid-feedback" *ngIf="submitted && f['motdepasse'].errors">
          <span *ngIf="f['motdepasse'].hasError('required')">Le mot de passe est requis</span>
          <span *ngIf="f['motdepasse'].hasError('minlength')">Le mot de passe doit contenir au moins 6 caractères</span>
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <div class="success-message" *ngIf="success">
        {{ success }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <span *ngIf="loading">Inscription en cours...</span>
        <span *ngIf="!loading">S'enregistrer</span>
      </button>

      <p class="login-link">
        Déjà inscrit? <a href="/login">Se connecter</a>
      </p>
    </form>
  </div>
</div>
